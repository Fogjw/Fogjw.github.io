# Butterfly 主题配置
# 完整文档: https://butterfly.js.org/

# --- 导航栏 ---
nav:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# --- 社交链接 ---
social:
  fab fa-github: https://github.com/Fogjw || GitHub || '#24292e'
  fab fa-x-twitter: https://x.com/Foggggg0924 || X || '#000000'
  fas fa-envelope: javascript:void(0) || QQ || '#4a7dbe'

# --- 代码块 ---
code_blocks:
  theme: light
  macStyle: false
  copy: true
  language: true
  shrink: false

# --- 头像 & 图标 ---
favicon: /img/avatar.png
avatar:
  img: /img/avatar.png
  effect: false

# --- 首页横幅 ---
disable_top_img: false
index_img: /img/bg002ax15.png
background: /img/BG014A.png
default_top_img: /img/bg905ax15.png
subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 拨云见码，以笔为舟

# --- 文章列表布局 ---
index_layout: 3
index_post_content:
  method: 3
  length: 500

# --- 文章设置 ---
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false

post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

post_pagination: 1

# --- 页脚 ---
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true

# --- 侧边栏 ---
aside:
  enable: true
  hide: false
  position: right
  card_author:
    enable: true
    description: 一个写代码的人
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Fogjw
  card_announcement:
    enable: true
    content: 欢迎来到我的博客 🎉
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 0

# --- 页脚社交 ---
footer_social:
  enable: true

# --- 网站验证 / 统计 ---
# 不配置，后续需要再加

# --- 评论系统 ---
# 暂不配置，后续需要再加

# --- 右侧工具栏 ---
rightside:
  open_text: 💬
  readmode: true
  translate: false
  nightmode: true
  aside: true
  fontscale: false
  hide: false

# --- 搜索 ---
local_search:
  enable: true
  preload: true
  CDN:

# --- 数学公式 ---
mathjax:
  enable: false
  per_page: false
katex:
  enable: false
  per_page: false

# --- 自定义样式 ---
inject:
  head:
    - '<style>#page-header:not(.full_page){background-position:center top -150px!important}
.card-info-social-icons{flex-direction:column!important;align-items:stretch!important;gap:4px!important;padding:0 16px 16px}
.card-info-social-icons .social-icon{display:flex!important;align-items:center!important;gap:8px!important;padding:6px 12px!important;border-radius:6px!important;transition:background .2s;width:auto!important;height:auto!important;font-size:14px!important}
.card-info-social-icons .social-icon:hover{background:var(--btn-bg)!important;color:var(--btn-color)!important}
.card-info-social-icons .social-icon i{font-size:20px!important;width:24px!important;text-align:center!important}
.card-info-social-icons .social-icon::after{content:attr(title);font-size:14px}
.card-info-social-icons .social-icon[title*="QQ"]{pointer-events:none;opacity:.7}
.card-info-social-icons .social-icon[title*="QQ"]::after{content:"1778357215@qq.com"}
</style>'
